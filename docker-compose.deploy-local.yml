name: vaccitrack-deploy-local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vaccitrack
      POSTGRES_USER: vaccitrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.deploy-local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaccitrack -d vaccitrack"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [vaccitrack]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/vaccitrack
      KC_DB_USERNAME: vaccitrack
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.deploy-local}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD in .env.deploy-local}
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY: edge
      KC_SPI_THEME_DEFAULT: immunova
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
      - ./infra/keycloak-themes:/opt/keycloak/themes:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [vaccitrack]

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: build
    profiles: ["migrate"]
    environment:
      DATABASE_URL: postgresql://vaccitrack:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.deploy-local}@postgres:5432/vaccitrack
      NODE_ENV: production
    command: ["pnpm", "--filter", "@vaccitrack/db", "run", "db:migrate:deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [vaccitrack]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vaccitrack:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.deploy-local}@postgres:5432/vaccitrack
      KEYCLOAK_URL: http://keycloak:8080/auth
      KEYCLOAK_REALM: vaccitrack
      KEYCLOAK_CLIENT_ID: vaccitrack-api
      KEYCLOAK_SECRET: ${KEYCLOAK_SECRET:?Set KEYCLOAK_SECRET in .env.deploy-local}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks: [vaccitrack]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    networks: [vaccitrack]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${VACCITRACK_HTTP_PORT:-18080}:80"
    volumes:
      - ./infra/nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on: [api, web, keycloak]
    networks: [vaccitrack]

volumes:
  postgres_data:

networks:
  vaccitrack:
    driver: bridge
